<!DOCTYPE html>
<html>
<head>
  <title>Goober Levels</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    // user id system
    let userId_gooberlevels = localStorage.getItem("userId_gooberlevels");

    if (!userId_gooberlevels) {
      userId_gooberlevels = crypto.randomUUID();
      localStorage.setItem("userId_gooberlevels", userId_gooberlevels);
    }

    // supabase setup
    const supabaseUrl = "https://mkomhjslpvgsdcvrqtrl.supabase.co";
    const supabaseKey = "sb_publishable_bAD4YOSO75_r-gLXH0ucow_RXsLC249";

    const client = supabase.createClient(supabaseUrl, supabaseKey);
  </script>
</head>

<body>
  <h1>Goober Levels</h1>

  <script>
    window.onload = async () => {
      await client
        .from("gooberlevel")
        .upsert(
          [
            {
              user_id: userId_gooberlevels,
              gooberlevel: 1
            }
          ],
          {
            onConflict: "user_id",
            ignoreDuplicates: true
          }
        );
    };
  </script>
</body>
</html>
