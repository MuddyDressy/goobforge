<!DOCTYPE html>
<html>
<head>
  <title>One Word</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mkomhjslpvgsdcvrqtrl.supabase.co"
    const supabaseKey = "sb_publishable_bAD4YOSO75_r-gLXH0ucow_RXsLC249"

    const client = supabase.createClient(supabaseUrl, supabaseKey)

    let userId = localStorage.getItem("userId");
    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem("userId", userId);
    }

    const COOLDOWN_MS = 300000; // ⬅️ increased cooldown (5 minutes)

    let submitting = false;
    let cooldownInterval = null;
  </script>

  <style>
    #cooldownText {
      margin: 10px 0;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>

<body>
  <h1>ONE WORD AT A TIME SO FAR:</h1>

  <div id="wordList" style="margin-bottom: 20px;"></div>

  <div id="cooldownText">Ready</div>

  <input type="text" id="wordInput" placeholder="Type a word" />
  <button onclick="submitWord()">Submit</button>

  <script>
    function startCooldownUI() {
      const display = document.getElementById("cooldownText");
      const endTime = Date.now() + COOLDOWN_MS;

      clearInterval(cooldownInterval);

      cooldownInterval = setInterval(() => {
        const remaining = endTime - Date.now();

        if (remaining <= 0) {
          display.textContent = "Ready";
          clearInterval(cooldownInterval);
          return;
        }

        display.textContent = "Cooldown: " + Math.ceil(remaining / 1000) + "s";
      }, 100);
    }

    async function submitWord() {
      if (submitting) return;

      const word = document.getElementById("wordInput").value.trim();
      if (!word) return;

      const firstWord = word.split(" ")[0];

      const lastTime = Number(localStorage.getItem("lastSubmitTime"));
      const now = Date.now();

      if (lastTime && now - lastTime < COOLDOWN_MS) {
        return;
      }

      submitting = true;

      try {
        const { error } = await client
          .from("words")
          .insert([
            {
              word: firstWord,
              user_id: userId
            }
          ]);

        if (error) {
          console.log("INSERT ERROR:", error);
          return;
        }

        localStorage.setItem("lastSubmitTime", Date.now());

        document.getElementById("wordInput").value = "";
        loadWords();

        startCooldownUI(); // ⬅️ show cooldown after success

      } finally {
        submitting = false;
      }
    }

    async function loadWords() {
      const { data, error } = await client
        .from("words")
        .select("*")
        .order("id", { ascending: true });

      if (error) return;

      document.getElementById("wordList").innerHTML =
        data.map(item => item.word).join(" ");
    }

    window.onload = loadWords;
  </script>
</body>
</html>
