<!DOCTYPE html>
<html>
<head>
  <title>One Word</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mkomhjslpvgsdcvrqtrl.supabase.co"
    const supabaseKey = "sb_publishable_bAD4YOSO75_r-gLXH0ucow_RXsLC249"

    const client = supabase.createClient(supabaseUrl, supabaseKey)
  </script>
</head>

<body>
  <h1>ONE WORD AT A TIME SO FAR:</h1>

  <div id="wordList" style="margin-bottom: 20px;"></div>

  <input type="text" id="wordInput" placeholder="Type a word" />
  <button onclick="submitWord()">Submit</button>

  <script>
    async function submitWord() {
      const word = document.getElementById("wordInput").value;

      const { error } = await client
        .from("words")
        .insert([
          { word: word, user_id: "test" }
        ]);

      if (error) {
        console.log("INSERT ERROR:", error);
        return;
      }

      document.getElementById("wordInput").value = "";
      loadWords();
    }

    async function loadWords() {
      const { data, error } = await client
        .from("words")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.log("LOAD ERROR:", error);
        return;
      }

      const container = document.getElementById("wordList");

      // combine into single line (NOT list)
      container.innerHTML = data
        .map(item => item.word)
        .join(" ");
    }

    // run AFTER page loads
    window.onload = loadWords;
  </script>
</body>
</html>
