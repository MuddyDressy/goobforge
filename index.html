<!DOCTYPE html>
<html>
<head>
  <title>One Word</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mkomhjslpvgsdcvrqtrl.supabase.co"
    const supabaseKey = "sb_publishable_bAD4YOSO75_r-gLXH0ucow_RXsLC249"

    const client = supabase.createClient(supabaseUrl, supabaseKey)

    let userId = localStorage.getItem("userId");
    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem("userId", userId);
    }

    const COOLDOWN_MS = 300000; // change if needed
    let submitting = false;
    let cooldownInterval = null;
  </script>

  <style>
    #cooldownText {
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>ONE WORD AT A TIME SO FAR:</h1>

  <div id="wordList" style="margin-bottom: 20px;"></div>

  <div id="cooldownText">READY</div>

  <input type="text" id="wordInput" placeholder="Type a word" />
  <button onclick="submitWord()">Submit</button>

  <script>
    function formatTime(ms) {
      const totalSeconds = Math.ceil(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      if (minutes > 0) {
        return `${minutes}m ${seconds}s`;
      }
      return `${seconds}s`;
    }

    function updateCooldownUI(msLeft) {
      const el = document.getElementById("cooldownText");

      if (msLeft <= 0) {
        el.textContent = "READY";
        return;
      }

      el.textContent = "Cooldown: " + formatTime(msLeft);
    }

    function startCooldown() {
      const start = Date.now();
      const end = start + COOLDOWN_MS;

      clearInterval(cooldownInterval);

      cooldownInterval = setInterval(() => {
        const remaining = end - Date.now();

        if (remaining <= 0) {
          clearInterval(cooldownInterval);
          updateCooldownUI(0);
          return;
        }

        updateCooldownUI(remaining);
      }, 100);
    }

    function syncCooldownOnLoad() {
      const lastTime = Number(localStorage.getItem("lastSubmitTime") || 0);
      const now = Date.now();

      const remaining = COOLDOWN_MS - (now - lastTime);

      if (remaining > 0) {
        startCooldown();
      } else {
        updateCooldownUI(0);
      }
    }

    async function submitWord() {
      if (submitting) return;

      const word = document.getElementById("wordInput").value.trim();
      if (!word) return;

      const firstWord = word.split(" ")[0];

      const lastTime = Number(localStorage.getItem("lastSubmitTime") || 0);
      const now = Date.now();

      const remaining = COOLDOWN_MS - (now - lastTime);

      if (remaining > 0) {
        startCooldown();
        return;
      }

      submitting = true;

      try {
        const { error } = await client
          .from("words")
          .insert([
            {
              word: firstWord,
              user_id: userId
            }
          ]);

        if (error) {
          console.log("INSERT ERROR:", error);
          return;
        }

        localStorage.setItem("lastSubmitTime", Date.now());

        document.getElementById("wordInput").value = "";
        loadWords();

        startCooldown();

      } finally {
        submitting = false;
      }
    }

    async function loadWords() {
      const { data, error } = await client
        .from("words")
        .select("*")
        .order("id", { ascending: true });

      if (error) return;

      document.getElementById("wordList").innerHTML =
        data.map(item => item.word).join(" ");
    }

    window.onload = () => {
      loadWords();
      syncCooldownOnLoad();
    };
  </script>
</body>
</html>
