<!DOCTYPE html>
<html>
<head>
  <title>One Word</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mkomhjslpvgsdcvrqtrl.supabase.co"
    const supabaseKey = "sb_publishable_bAD4YOSO75_r-gLXH0ucow_RXsLC249"

    const client = supabase.createClient(supabaseUrl, supabaseKey)

    // create or load persistent user id
    let userId = localStorage.getItem("userId");

    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem("userId", userId);
    }

    const COOLDOWN_MS = 3000; // 3 seconds cooldown
  </script>
</head>

<body>
  <h1>ONE WORD AT A TIME SO FAR:</h1>

  <div id="wordList" style="margin-bottom: 20px;"></div>

  <input type="text" id="wordInput" placeholder="Type a word" />
  <button onclick="submitWord()">Submit</button>

  <script>
    async function submitWord() {
      const word = document.getElementById("wordInput").value;

      // only keep first word
      const firstWord = word.trim().split(" ")[0];

      // cooldown check
      const lastTime = localStorage.getItem("lastSubmitTime");
      const now = Date.now();

      if (lastTime && now - lastTime < COOLDOWN_MS) {
        alert("Wait a bit before sending another word!");
        return;
      }

      localStorage.setItem("lastSubmitTime", now);

      const { error } = await client
        .from("words")
        .insert([
          {
            word: firstWord,
            user_id: userId
          }
        ]);

      if (error) {
        console.log("INSERT ERROR:", error);
        return;
      }

      document.getElementById("wordInput").value = "";
      loadWords();
    }

    async function loadWords() {
      const { data, error } = await client
        .from("words")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        console.log("LOAD ERROR:", error);
        return;
      }

      const container = document.getElementById("wordList");

      container.innerHTML = data
        .map(item => item.word)
        .join(" ");
    }

    window.onload = loadWords;
  </script>
</body>
</html>
