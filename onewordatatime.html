<!DOCTYPE html>
<html>
<head>
  <title>One Word at a time</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mkomhjslpvgsdcvrqtrl.supabase.co"
    const supabaseKey = "sb_publishable_bAD4YOSO75_r-gLXH0ucow_RXsLC249"

    const client = supabase.createClient(supabaseUrl, supabaseKey)

    let userId = localStorage.getItem("userId");
    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem("userId", userId);
    }

    const COOLDOWN_MS = 300000;
    let submitting = false;
    let cooldownInterval = null;
  </script>

  <style>
    #cooldownText {
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
    }

    #contribText {
      margin: 10px 0;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <h1>ONE WORD AT A TIME SO FAR:</h1>

  <div id="wordList" style="margin-bottom: 20px;"></div>

  <div id="cooldownText">READY</div>

  <input type="text" id="wordInput" placeholder="Type a word" />
  <button onclick="submitWord()">Submit</button>

  <div id="contribText"></div>

  <script>
    function formatTime(ms) {
      const totalSeconds = Math.ceil(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }

    function getRemainingCooldown() {
      const lastTime = Number(localStorage.getItem("lastSubmitTime") || 0);
      return Math.max(0, COOLDOWN_MS - (Date.now() - lastTime));
    }

    function updateCooldownUI() {
      const remaining = getRemainingCooldown();
      const el = document.getElementById("cooldownText");

      el.textContent = remaining <= 0
        ? "READY"
        : "Cooldown: " + formatTime(remaining);
    }

    setInterval(updateCooldownUI, 200);

    async function updateContributors() {
      const { data, error } = await client
        .from("words")
        .select("user_id");

      if (error) return;

      const unique = new Set(data.map(x => x.user_id)).size;

      const text = unique === 1
        ? "1 goober has contributed to this chain"
        : `${unique} goobers have contributed to this chain`;

      document.getElementById("contribText").textContent = text;
    }

    async function submitWord() {
      if (submitting) return;

      const word = document.getElementById("wordInput").value.trim();
      if (!word) return;

      const firstWord = word.split(" ")[0];

      if (getRemainingCooldown() > 0) return;

      submitting = true;

      try {
        const { error } = await client
          .from("words")
          .insert([
            {
              word: firstWord,
              user_id: userId
            }
          ]);

        if (error) {
          console.log("INSERT ERROR:", error);
          return;
        }

        localStorage.setItem("lastSubmitTime", Date.now());

        document.getElementById("wordInput").value = "";

        loadWords();
        updateContributors();

      } finally {
        submitting = false;
      }
    }

    async function loadWords() {
      const { data, error } = await client
        .from("words")
        .select("*")
        .order("id", { ascending: true });

      if (error) return;

      document.getElementById("wordList").innerHTML =
        data.map(item => item.word).join(" ");
    }

    window.onload = () => {
      loadWords();
      updateContributors();
      updateCooldownUI();
    };
  </script>
</body>
</html>
